<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CDB admin</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #0d0d0f;
        color: #e8e6e3;
        font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
        font-size: 14px;
      }

      /* 좌측 persona 사이드바 + 우측 본문 2단 레이아웃 */
      .app {
        display: flex;
        align-items: flex-start;
      }
      #sidebar {
        position: sticky;
        top: 0;
        height: 100vh;
        width: 236px;
        flex: none;
        display: flex;
        flex-direction: column;
        background: rgba(255, 255, 255, 0.02);
        border-right: 1px solid rgba(255, 255, 255, 0.08);
      }
      .content {
        flex: 1;
        min-width: 0;
      }
      .side-head {
        padding: 16px 14px 12px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.07);
      }
      .side-head h1 {
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.02em;
        margin-bottom: 12px;
      }
      #persona-search {
        width: 100%;
        background: #1a1a1e;
        color: #e8e6e3;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 8px;
        padding: 7px 10px;
        font-size: 13px;
      }
      #persona-search::placeholder {
        color: rgba(255, 255, 255, 0.35);
      }
      .side-list {
        flex: 1;
        overflow-y: auto;
        padding: 8px;
      }
      .pitem {
        display: flex;
        flex-direction: column;
        gap: 3px;
        width: 100%;
        text-align: left;
        padding: 9px 11px;
        margin-bottom: 2px;
        border-radius: 9px;
        border: 1px solid transparent;
        background: transparent;
        color: inherit;
        cursor: pointer;
      }
      .pitem:hover {
        background: rgba(255, 255, 255, 0.045);
      }
      .pitem.active {
        background: rgba(255, 190, 80, 0.12);
        border-color: rgba(255, 190, 80, 0.35);
      }
      .pitem .pname {
        font-size: 13px;
        font-weight: 600;
        color: #e8e6e3;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .pitem.active .pname {
        color: #ffc466;
      }
      .pitem .pmeta {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.45);
      }
      .side-empty {
        padding: 14px;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.4);
      }

      header {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 14px 22px;
        background: rgba(13, 13, 15, 0.92);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }
      .cur-name {
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0.02em;
      }
      .counts {
        font-size: 12.5px;
        color: rgba(255, 255, 255, 0.55);
      }
      .counts b {
        color: #e8e6e3;
      }
      .gender-ctl {
        display: flex;
        align-items: center;
        gap: 7px;
        font-size: 12.5px;
        color: rgba(255, 255, 255, 0.55);
      }
      .gender-ctl .gsrc {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.4);
      }

      /* 세션 참가자(연구자용 "로그인") — 이 참가자의 생애가 4창 런타임에 재생된다. */
      .session-ctl {
        display: flex;
        align-items: center;
        gap: 9px;
        margin-left: auto;
        font-size: 12.5px;
      }
      .session-label {
        color: rgba(255, 255, 255, 0.55);
      }
      .session-label b {
        color: #7de08c;
      }
      #session-set {
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        padding: 6px 13px;
        border-radius: 999px;
        border: 1px solid rgba(110, 220, 130, 0.5);
        background: transparent;
        color: #7de08c;
      }
      #session-set:hover {
        background: rgba(110, 220, 130, 0.14);
      }
      #session-set:disabled {
        opacity: 0.45;
        cursor: default;
      }
      .pitem .psession {
        color: #7de08c;
        font-weight: 600;
      }

      main {
        padding: 20px 22px 60px;
      }
      .stage {
        margin-bottom: 30px;
      }
      .stage h2 {
        font-size: 13px;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.6);
        letter-spacing: 0.06em;
        margin-bottom: 10px;
      }
      .row {
        display: flex;
        gap: 14px;
        align-items: flex-start;
        flex-wrap: wrap;
      }

      .card {
        background: #17171a;
        border: 1px solid rgba(255, 255, 255, 0.07);
        border-radius: 12px;
        overflow: hidden;
        width: 340px;
        flex: none;
        transition: opacity 0.2s ease;
      }
      .card img {
        display: block;
        width: 100%;
        aspect-ratio: 1344 / 768;
        object-fit: cover;
        background: #000;
        cursor: zoom-in;
      }
      .card .meta {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 9px 11px;
      }
      .card .meta .id {
        font-size: 12.5px;
        font-weight: 600;
      }
      .card .meta .sub {
        font-size: 11.5px;
        color: rgba(255, 255, 255, 0.45);
      }
      .badge {
        margin-left: auto;
        font-size: 11px;
        font-weight: 600;
        padding: 3px 8px;
        border-radius: 999px;
      }

      .actions {
        display: flex;
        gap: 6px;
        padding: 0 11px 11px;
      }
      .actions button {
        flex: 1;
        padding: 7px 0;
        font-size: 12.5px;
        font-weight: 600;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.13);
        background: transparent;
        color: rgba(255, 255, 255, 0.8);
        cursor: pointer;
      }
      .actions button:hover {
        border-color: rgba(255, 255, 255, 0.4);
      }
      .actions button:disabled {
        opacity: 0.4;
        cursor: default;
      }

      .card.failed {
        border-color: rgba(255, 110, 110, 0.4);
      }
      .card-failed {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        aspect-ratio: 1344 / 768;
        background: repeating-linear-gradient(
          45deg,
          rgba(255, 110, 110, 0.06),
          rgba(255, 110, 110, 0.06) 12px,
          transparent 12px,
          transparent 24px
        );
        color: rgba(255, 133, 133, 0.85);
        font-size: 12.5px;
        font-weight: 600;
      }

      .hidden {
        display: none;
      }
      #status {
        position: fixed;
        right: 18px;
        bottom: 14px;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.5);
      }

      /* 생성 큐 (collector 제출 → 자동 생성) */
      #queue-panel {
        padding: 12px 22px;
        background: rgba(255, 255, 255, 0.025);
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }
      .qhead {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 10px;
      }
      .qhead h2 {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.04em;
        color: rgba(255, 255, 255, 0.7);
      }
      .qhead .now {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.55);
      }
      .qhead .now b {
        color: #ffc466;
      }
      .qhead .now button {
        margin-left: 8px;
        font-size: 11.5px;
        font-weight: 600;
        cursor: pointer;
        padding: 3px 10px;
        border-radius: 999px;
        border: 1px solid rgba(255, 190, 80, 0.5);
        background: transparent;
        color: #ffc466;
      }
      .qhead .now button:hover {
        background: rgba(255, 190, 80, 0.16);
      }
      #auto-toggle {
        margin-left: auto;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        padding: 6px 13px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: transparent;
        color: rgba(255, 255, 255, 0.7);
      }
      #auto-toggle.on {
        background: rgba(110, 220, 130, 0.9);
        color: #0b0b0c;
        border-color: transparent;
      }
      #auto-toggle.off {
        background: rgba(255, 190, 80, 0.16);
        color: #ffc466;
      }
      .qlist {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .qitem {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        padding: 6px 10px;
        border-radius: 8px;
        background: #17171a;
        border: 1px solid rgba(255, 255, 255, 0.07);
      }
      .qitem .qid {
        color: rgba(255, 255, 255, 0.85);
        font-weight: 600;
      }
      .qitem .badge {
        margin-left: 0;
      }
      .badge.submitted {
        background: rgba(150, 170, 255, 0.16);
        color: #a9b8ff;
      }
      .badge.generating {
        background: rgba(255, 190, 80, 0.18);
        color: #ffc466;
      }
      .badge.done {
        background: rgba(110, 220, 130, 0.16);
        color: #7de08c;
      }
      .badge.error {
        background: rgba(255, 110, 110, 0.16);
        color: #ff8585;
      }
      .qempty {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.4);
      }
      /* 중지/재실행 버튼 */
      .stop-btn {
        font-size: 11.5px;
        font-weight: 600;
        cursor: pointer;
        padding: 3px 10px;
        border-radius: 999px;
        border: 1px solid rgba(255, 110, 110, 0.5);
        background: transparent;
        color: #ff8585;
      }
      .stop-btn:hover {
        background: rgba(255, 110, 110, 0.16);
      }
      .stop-btn:disabled {
        opacity: 0.5;
        cursor: default;
      }
      .retry-btn {
        margin-left: 2px;
        font-size: 11px;
        font-weight: 600;
        cursor: pointer;
        padding: 2px 8px;
        border-radius: 999px;
        border: 1px solid rgba(150, 170, 255, 0.5);
        background: transparent;
        color: #a9b8ff;
      }
      .retry-btn:hover {
        background: rgba(150, 170, 255, 0.16);
      }
      .retry-btn:disabled {
        opacity: 0.5;
        cursor: default;
      }
      .gen-btn {
        margin-left: 2px;
        font-size: 11px;
        font-weight: 600;
        cursor: pointer;
        padding: 2px 8px;
        border-radius: 999px;
        border: 1px solid rgba(120, 220, 150, 0.5);
        background: transparent;
        color: #8de8a8;
      }
      .gen-btn:hover {
        background: rgba(120, 220, 150, 0.16);
      }
      .gen-btn:disabled {
        opacity: 0.5;
        cursor: default;
      }
      #queue-now button {
        margin-left: 6px;
      }

      /* 주마등 릴 (전 장면 → 90초 단일 영상) */
      .video-panel {
        margin-bottom: 28px;
        padding: 14px 16px;
        border-radius: 12px;
        background: rgba(255, 190, 80, 0.05);
        border: 1px solid rgba(255, 190, 80, 0.18);
      }
      .video-head h2 {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.04em;
        color: #ffc466;
        margin-bottom: 12px;
      }
      .video-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
      }
      .video-label {
        font-size: 12.5px;
        color: rgba(255, 255, 255, 0.6);
        margin-right: auto; /* 레이블을 왼쪽으로 밀어 버튼들을 오른쪽에 모은다 */
      }
      .video-label b {
        color: #e8e6e3;
      }
      /* 노란 계열 기본 버튼(영상 생성/릴 생성). stop-btn(일시정지·중단)은 별도 붉은 스타일 사용. */
      .video-row button:not(.stop-btn) {
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        padding: 6px 13px;
        border-radius: 999px;
        border: 1px solid rgba(255, 190, 80, 0.5);
        background: transparent;
        color: #ffc466;
      }
      .video-row button:not(.stop-btn):hover {
        background: rgba(255, 190, 80, 0.16);
      }
      .video-row button:not(.stop-btn):disabled {
        opacity: 0.45;
        cursor: default;
      }
      .video-panel video {
        display: block;
        width: 100%;
        max-width: 720px;
        border-radius: 10px;
        background: #000;
        aspect-ratio: 832 / 480;
        margin-top: 6px;
      }

      /* 확대 보기 */
      #zoom {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.92);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 50;
        cursor: zoom-out;
      }
      #zoom.show {
        display: flex;
      }
      #zoom img {
        max-width: 94vw;
        max-height: 90vh;
      }
      #zoom .cap {
        position: fixed;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 12px;
        color: rgba(255, 255, 255, 0.7);
        max-width: 90vw;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside id="sidebar">
        <div class="side-head">
          <h1>생애 라이브러리</h1>
          <input id="persona-search" type="search" placeholder="이름 검색…" autocomplete="off" />
        </div>
        <div class="side-list" id="persona-list"></div>
      </aside>
      <div class="content">
        <header>
          <span class="cur-name" id="cur-name"></span>
          <span class="counts" id="counts"></span>
          <span class="gender-ctl" id="gender-ctl">
            <label for="gender">성별</label>
            <select id="gender">
              <option value="">미지정</option>
              <option value="male">남성</option>
              <option value="female">여성</option>
            </select>
            <span class="gsrc" id="gender-src"></span>
          </span>
          <span class="session-ctl" id="session-ctl">
            <span class="session-label" id="session-label">세션 미설정</span>
            <button id="session-set" title="이 참가자의 생애를 4창 런타임에서 재생합니다">
              이 참가자를 세션으로
            </button>
          </span>
        </header>
        <section id="queue-panel" class="hidden">
      <div class="qhead">
        <h2>생성 큐</h2>
        <span class="now" id="queue-now"></span>
        <button id="auto-toggle"></button>
      </div>
      <div class="qlist" id="queue-list"></div>
    </section>
        <main id="main"></main>
      </div>
    </div>
    <div id="status"></div>
    <div id="zoom">
      <img />
      <div class="cap"></div>
    </div>

    <script>
      const $ = (s, el = document) => el.querySelector(s)
      let pid = null
      let manifest = null
      let personas = [] // 최신 생성순(내림차순) persona 목록 캐시
      let personaFilter = '' // 사이드바 이름 검색어
      let sessionPid = null // 현재 세션 참가자 (4창 런타임이 재생 중인 대상)
      let videoState = null // /api/queue의 video: { building:{pid,kind}, queue, job, last }
      let lastVideoAt = 0 // 마지막으로 반영한 영상 작업 완료 시각 (완료 감지→manifest 재로딩)

      // 생성 시각 → 상대 표기 (사이드바 큐 정렬 근거를 사람이 읽게)
      function timeAgo(iso) {
        const t = new Date(iso).getTime()
        if (!isFinite(t)) return ''
        const s = Math.floor((Date.now() - t) / 1000)
        if (s < 60) return '방금'
        const m = Math.floor(s / 60)
        if (m < 60) return `${m}분 전`
        const h = Math.floor(m / 60)
        if (h < 24) return `${h}시간 전`
        return `${Math.floor(h / 24)}일 전`
      }

      const api = (p, opts) =>
        fetch(p, opts).then(async (r) => {
          const j = await r.json()
          if (!r.ok) throw new Error(j.error || r.status)
          return j
        })
      const imgUrl = (e) => `/img/${pid}/${e.file}?rev=${e.rev || 0}`
      const setStatus = (t) => {
        $('#status').textContent = t
      }

      // 사이드바 목록 렌더 — 검색어(personaFilter)로 걸러 최신순으로 나열하고
      // 현재 선택(pid)을 강조한다. 데이터는 personas 캐시에서만 읽어 재호출이 싸다.
      function renderPersonaList() {
        const el = $('#persona-list')
        const q = personaFilter.trim().toLowerCase()
        const shown = q
          ? personas.filter((p) => (p.name || p.personaId).toLowerCase().includes(q))
          : personas
        if (shown.length === 0) {
          el.innerHTML = `<div class="side-empty">${
            personas.length === 0 ? '아직 생성된 persona가 없습니다.' : '검색 결과 없음'
          }</div>`
          return
        }
        el.innerHTML = shown
          .map(
            (p) =>
              `<button class="pitem${p.personaId === pid ? ' active' : ''}" data-pid="${p.personaId}">` +
              `<span class="pname">${p.name || p.personaId}</span>` +
              `<span class="pmeta">${p.total}장 · ${timeAgo(p.createdAt)}` +
              `${p.personaId === sessionPid ? ' · <span class="psession">● 세션</span>' : ''}</span>` +
              `</button>`
          )
          .join('')
      }

      // keep=true면 현재 보고 있던 persona 선택을 유지한 채 목록만 갱신한다
      // (자동 생성 완료로 새 persona가 들어와도 검토 중이던 화면이 튀지 않도록).
      async function loadPersonas({ keep = false } = {}) {
        const list = await api('/api/personas')
        // 최신 생성순(내림차순). createdAt 없는 옛 persona는 뒤로 민다.
        list.sort((a, b) => (new Date(b.createdAt).getTime() || 0) - (new Date(a.createdAt).getTime() || 0))
        personas = list
        const prev = pid
        if (list.length === 0) {
          pid = null
          $('#cur-name').textContent = ''
          renderPersonaList()
          $('#main').innerHTML =
            '<p style="color:#888">라이브러리가 비어 있습니다. 제출을 기다리거나 npm run gen:library 로 생성하세요.</p>'
          return
        }
        if (keep && prev && list.some((p) => p.personaId === prev)) {
          pid = prev
          renderPersonaList()
          return // 선택 유지, manifest 재로딩 생략
        }
        pid = list[0].personaId
        renderPersonaList()
        await loadManifest()
      }

      async function loadManifest() {
        manifest = await api(`/api/personas/${pid}`)
        render()
      }

      // 성별 표시: 자동 감지값 + 근거 캡션(툴팁). 수정하면 프롬프트가 갱신되고
      // 이후 재생성부터 반영된다 (기존 이미지는 그대로).
      function renderGender() {
        const g = manifest?.profile?.gender || ''
        $('#gender').value = g
        const src = manifest?.gender?.source
        $('#gender-src').textContent =
          src === 'auto' ? '자동감지' : src === 'manual' ? '수동' : src === 'profile' ? '제출값' : ''
        $('#gender-ctl').title = manifest?.gender?.caption || ''
      }

      function counts() {
        const total = manifest.images.length
        const failed = manifest.images.filter((im) => im.failed).length
        $('#counts').innerHTML =
          `총 <b>${total - failed}</b>장` + (failed ? ` · <b style="color:#ff8585">실패 ${failed}</b>` : '')
      }

      // 세션 참가자 컨트롤 — 현재 세션 대상과, 보고 있는 참가자를 세션으로 지정하는 버튼.
      function renderSessionCtl() {
        const label = $('#session-label')
        const btn = $('#session-set')
        if (sessionPid) {
          const p = personas.find((x) => x.personaId === sessionPid)
          label.innerHTML = `세션: <b>${p?.name || sessionPid}</b>`
        } else {
          label.textContent = '세션 미설정'
        }
        btn.disabled = !pid || pid === sessionPid
        btn.textContent = pid && pid === sessionPid ? '현재 세션' : '이 참가자를 세션으로'
      }

      // 서버에서 현재 세션 선택을 읽어 온다 (초기 로드 시).
      async function loadSession() {
        try {
          const s = await api('/api/session')
          sessionPid = s.personaId || null
        } catch {
          sessionPid = null // 세션 API가 없는 구버전 서버면 조용히 미설정 처리.
        }
        renderSessionCtl()
        renderPersonaList()
      }

      // 별도 승인 절차 없음 — 전 장이 기본 노출. 문제 장·실패 장만 재생성으로 교체한다.
      // failed 장(생성 중 타임아웃 등으로 건너뜀)은 플레이스홀더로 표시하고 재생성 버튼을 노출한다.
      function card(entry) {
        const div = document.createElement('div')
        div.className = 'card' + (entry.failed ? ' failed' : '')
        const sub = `${entry.age}살 · ${entry.year}${entry.isPast ? '' : ' (미래)'}`
        // 카드 썸네일 비율을 실제 생성 크기에 맞춘다(파노라마 4:1 등이 잘리지 않게).
        const im = manifest && manifest.image
        const ar = im && im.width && im.height ? `${im.width} / ${im.height}` : '1344 / 768'
        const media = entry.failed
          ? `<div class="card-failed" style="aspect-ratio:${ar}">생성 실패 — 재생성 필요</div>`
          : `<img src="${imgUrl(entry)}" loading="lazy" style="aspect-ratio:${ar}" title="${entry.prompt.replaceAll('"', '&quot;')}" />`
        // edge 재연결: seamfix 워크플로우 + 보관된 Gemini 원본(srcFile)이 있을 때만.
        const canReseam = manifest && manifest.workflow === 'seamfix' && entry.srcFile && !entry.failed
        div.innerHTML = `
        ${media}
        <div class="meta"><span class="id">${entry.id}</span><span class="sub">${sub}</span>${entry.failed ? '<span class="badge error">실패</span>' : ''}</div>
        <div class="actions">
          <button class="re" title="Gemini부터 전체 다시 생성">재생성</button>
          ${canReseam ? '<button class="reseam" title="Gemini 원본은 두고 seamless 이음매만 다시 붙임 (재과금 없음)">edge 재연결</button>' : ''}
        </div>`

        const imgEl = $('img', div)
        if (imgEl)
          imgEl.addEventListener('click', () => {
            $('#zoom img').src = imgUrl(entry)
            $('#zoom .cap').textContent = `${entry.id} — ${entry.prompt}`
            $('#zoom').classList.add('show')
          })
        $('.re', div).addEventListener('click', async () => {
          const btn = $('.re', div)
          const other = $('.reseam', div)
          btn.disabled = true
          if (other) other.disabled = true
          btn.textContent = '생성 중…'
          setStatus(`${entry.id} 재생성 중 (~15초)`)
          try {
            const out = await api(`/api/personas/${pid}/regen`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ id: entry.id })
            })
            Object.assign(entry, out.entry)
            delete entry.failed // 서버가 failed 키를 지워 보내므로 로컬에서도 해제
            setStatus(`${entry.id} 재생성 완료`)
            render()
          } catch (e) {
            setStatus(`재생성 실패: ${e.message}`)
            btn.disabled = false
            btn.textContent = '재생성'
            if (other) other.disabled = false
          }
        })
        const reseamBtn = $('.reseam', div)
        if (reseamBtn)
          reseamBtn.addEventListener('click', async () => {
            const re = $('.re', div)
            reseamBtn.disabled = true
            if (re) re.disabled = true
            reseamBtn.textContent = '재연결 중…'
            setStatus(`${entry.id} edge 재연결 중 (~60초, Gemini 재생성 없음)`)
            try {
              const out = await api(`/api/personas/${pid}/reseam`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: entry.id })
              })
              Object.assign(entry, out.entry)
              setStatus(`${entry.id} edge 재연결 완료`)
              render()
            } catch (e) {
              setStatus(`edge 재연결 실패: ${e.message}`)
              reseamBtn.disabled = false
              reseamBtn.textContent = 'edge 재연결'
              if (re) re.disabled = false
            }
          })
        return div
      }

      function render() {
        $('#cur-name').textContent = manifest?.profile?.name || pid || ''
        counts()
        renderGender()
        renderSessionCtl()
        const main = $('#main')
        main.innerHTML = ''
        // 단계(stageIndex)별로 묶기
        const stages = new Map()
        manifest.images.forEach((img) => {
          if (!stages.has(img.stageIndex)) stages.set(img.stageIndex, [])
          stages.get(img.stageIndex).push(img)
        })
        for (const [si, scenes] of [...stages.entries()].sort((a, b) => a[0] - b[0])) {
          const age = scenes[0].age
          const section = document.createElement('section')
          section.className = 'stage'
          section.innerHTML = `<h2>단계 ${si} — ${age}살 (${scenes[0].year}${scenes[0].isPast ? '' : ', 미래'})</h2>`
          const row = document.createElement('div')
          row.className = 'row'
          scenes.forEach((s) => row.appendChild(card(s)))
          section.appendChild(row)
          main.appendChild(section)
        }
        main.insertAdjacentHTML('afterbegin', '<div id="reel-slot"></div>')
        mountVideo()
      }

      // 주마등 영상 패널 — 2단계. ① 영상(클립) 생성: 전 장면을 Wan 클립으로(N/총). ② 릴 합성:
      // 사전 생성된 클립을 90초 릴로. 각각 버튼. 진행 상태는 videoState(pollQueue가 갱신).
      function renderVideo() {
        if (!pid || !manifest) return ''
        const cs = manifest._clipStatus || { clipsDone: 0, clipsTotal: manifest.images.length }
        const reel = manifest.reel
        const b = videoState && videoState.building // { pid, kind } | null
        const job = (videoState && videoState.job) || {}
        const buildingClips = b && b.pid === pid && b.kind === 'clips'
        const buildingReel = b && b.pid === pid && b.kind === 'reel'
        const buildingRecover = b && b.pid === pid && b.kind === 'recover'
        const qHas = (kind) => videoState && (videoState.queue || []).some((v) => v.pid === pid && v.kind === kind)

        // ── ① 영상 생성 행 (seedance-flf=전이 | wan=클립) ──
        const unit = cs.mode === 'seedance' ? '루프' : '클립'
        let clipRow
        if (buildingClips) {
          clipRow =
            `<span class="video-label">영상 ${unit} <b>${job.done || 0}/${job.total || cs.clipsTotal}</b> 생성 중…</span>` +
            `<button id="video-pause" class="stop-btn">일시정지</button>` +
            `<button id="video-stop" class="stop-btn">중단</button>`
        } else if (buildingRecover) {
          clipRow = `<span class="video-label">ComfyUI 복구 <b>${job.done || 0}/${job.total || cs.clipsTotal}</b> …</span>`
        } else {
          const label = qHas('clips')
            ? '대기 중…'
            : cs.clipsDone === 0
              ? '영상 생성 시작'
              : cs.clipsDone < cs.clipsTotal
                ? `이어서 생성 (${cs.clipsDone}/${cs.clipsTotal})`
                : '영상 완료 ✓'
          const done = cs.clipsDone >= cs.clipsTotal && cs.clipsTotal > 0
          // 부족분이 있으면 ComfyUI 서버 output에서 회수하는 복구 버튼 노출(생성됐으나 다운로드 실패한 경우).
          const recoverBtn =
            !done && !qHas('recover')
              ? `<button id="video-recover" title="ComfyUI 서버에 남은 클립을 회수해 로컬+Firebase로 복구">ComfyUI에서 복구</button>`
              : qHas('recover')
                ? `<button disabled>복구 대기 중…</button>`
                : ''
          clipRow =
            `<span class="video-label">영상 ${unit} <b>${cs.clipsDone}/${cs.clipsTotal}</b>${done ? ' · 완료' : ''}</span>` +
            `<button id="video-genclips"${qHas('clips') || done ? ' disabled' : ''}>${label}</button>` +
            recoverBtn
        }

        // ── ② 릴 합성 행 ──
        let reelRow
        const reelMeta = reel && reel.durationSec ? `${reel.durationSec.toFixed(1)}초 · ${timeAgo(reel.builtAt)}` : '없음'
        if (buildingReel) {
          reelRow = `<span class="video-label">릴 합성 중…</span>`
        } else {
          const canReel = cs.clipsDone > 0
          const label = qHas('reel') ? '대기 중…' : reel ? '릴 재생성' : '릴 생성'
          reelRow =
            `<span class="video-label">릴 <b>${reelMeta}</b></span>` +
            `<button id="reel-build"${!canReel || qHas('reel') ? ' disabled' : ''} title="${canReel ? '' : '먼저 영상 클립을 생성하세요'}">${label}</button>`
        }

        const player =
          reel && reel.file && !buildingReel
            ? `<video controls playsinline preload="metadata" src="/media/${pid}/${reel.file}?rev=${reel.rev || 0}"></video>`
            : ''

        // ── ☁ Firebase 정본 상태 (로컬 캐시와 별개) ──
        let fbRow = ''
        const fb = manifest._firebase
        if (fb) {
          const behind = fb.clips < fb.total
          fbRow =
            `<div class="video-row"><span class="video-label" style="opacity:.85">` +
            `☁ Firebase <b>${fb.clips}/${fb.total}</b> 클립 · reel ${fb.reel ? '✓' : '✗'}` +
            (behind ? ` <span style="color:#e0a030">— 로컬보다 부족(복구/재업로드 필요)</span>` : '') +
            `</span></div>`
        }

        return (
          `<section class="video-panel"><div class="video-head"><h2>주마등 영상</h2></div>` +
          `<div class="video-row">${clipRow}</div>` +
          `<div class="video-row">${reelRow}</div>${fbRow}${player}</section>`
        )
      }
      // #reel-slot 안만 갱신 — 진행률 폴링이 장면 그리드를 건드리지 않게.
      function mountVideo() {
        const slot = $('#reel-slot')
        if (slot) slot.innerHTML = renderVideo()
      }
      async function postVideo(path, okMsg, failMsg, body = {}) {
        try {
          await api(path, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) })
          setStatus(okMsg)
          mountVideo()
        } catch (e) {
          setStatus(`${failMsg}: ${e.message}`)
        }
      }
      const genClips = () =>
        postVideo(`/api/personas/${pid}/clips`, '영상 클립 생성 시작 — 진행은 영상 패널에 표시 (장당 ~1분, 30장이면 수십 분)', '영상 생성 실패')
      const buildReel = () =>
        postVideo(`/api/personas/${pid}/reel`, '릴 합성 시작 — Firebase 클립(없으면 로컬)으로 90초 합성', '릴 합성 실패')
      const recoverClips = () =>
        postVideo(`/api/personas/${pid}/recover-clips`, 'ComfyUI 복구 시작 — 서버 output에서 회수해 로컬+Firebase로 복구', '복구 실패')
      const pauseVideo = () =>
        postVideo('/api/video/stop', '일시정지 요청 — 현재 클립까지 마치고 멈춥니다 (이어서 생성 가능)', '일시정지 실패', { kind: 'pause' })
      const stopVideo = () =>
        postVideo('/api/video/stop', '중단 요청 — 현재 클립까지 마치고 멈춥니다 (만든 클립은 유지)', '중단 실패', { kind: 'stop' })
      async function retryProfile(id, btn) {
        if (btn) {
          btn.disabled = true
          btn.textContent = '재실행 중…'
        }
        try {
          await api('/api/retry', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id }) })
          setStatus(`재실행 요청: ${id} — 다시 생성 대기열로`)
        } catch (e) {
          setStatus(`재실행 실패: ${e.message}`)
        }
      }
      // 인생그래프 세션은 자동 생성이 없다 — 이 버튼이 유일한 시작 지점(/api/lifegraph/generate).
      async function startLifeGraph(id, btn) {
        if (btn) {
          btn.disabled = true
          btn.textContent = '시작 중…'
        }
        try {
          await api('/api/lifegraph/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id })
          })
          setStatus(`생성 시작: ${id}`)
        } catch (e) {
          setStatus(`생성 시작 실패: ${e.message}`)
          if (btn) {
            btn.disabled = false
            btn.textContent = '생성'
          }
        }
      }
      // 재렌더되는 버튼들 — 이벤트 위임
      document.addEventListener('click', (e) => {
        const t = e.target
        if (!t) return
        if (t.id === 'reel-build') buildReel()
        else if (t.id === 'video-recover') recoverClips()
        else if (t.id === 'video-genclips') genClips()
        else if (t.id === 'video-pause') pauseVideo()
        else if (t.id === 'video-stop') stopVideo()
        else if (t.classList.contains('retry-btn')) retryProfile(t.dataset.id, t)
        else if (t.classList.contains('gen-btn')) startLifeGraph(t.dataset.id, t)
      })

      // 사이드바에서 persona 선택 (이벤트 위임)
      $('#persona-list').addEventListener('click', (e) => {
        const item = e.target.closest('.pitem')
        if (!item || item.dataset.pid === pid) return
        pid = item.dataset.pid
        renderPersonaList() // 강조 즉시 이동
        loadManifest()
      })
      $('#persona-search').addEventListener('input', (e) => {
        personaFilter = e.target.value
        renderPersonaList()
      })
      $('#gender').addEventListener('change', async (e) => {
        if (!pid || !manifest) return
        try {
          const out = await api(`/api/personas/${pid}/gender`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ gender: e.target.value || null })
          })
          setStatus(out.note)
          await loadManifest()
        } catch (err) {
          setStatus(`성별 수정 실패: ${err.message}`)
          renderGender() // 실패 시 원래 값으로 되돌림
        }
      })
      // 세션 참가자 지정 — 지금 보고 있는 참가자를 4창 런타임 세션으로 설정.
      $('#session-set').addEventListener('click', async () => {
        if (!pid) return
        try {
          const sel = await api('/api/session', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ personaId: pid })
          })
          sessionPid = sel.personaId
          setStatus(`세션 참가자 → ${sel.name || sel.personaId} (런타임이 IDLE이면 즉시 반영)`)
          renderSessionCtl()
          renderPersonaList()
        } catch (e) {
          setStatus(`세션 설정 실패: ${e.message}`)
        }
      })
      $('#zoom').addEventListener('click', () => $('#zoom').classList.remove('show'))
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') $('#zoom').classList.remove('show')
      })

      // ── 생성 큐 (collector 제출 → admin 자동 생성) ────────────────────
      let autoOn = true
      let lastCompletionAt = 0
      let liveSig = '' // 실시간 보기: 마지막으로 그린 manifest의 장면 수 — 바뀔 때만 재렌더
      const QLABEL = { submitted: '대기', generating: '생성중', error: '실패' }

      async function pollQueue() {
        let data
        try {
          data = await api('/api/queue')
        } catch {
          return
        }

        // 영상 상태 반영 (Firebase 무관 — 수동 작업도 진행 표시). 완료 감지 시 manifest 재로딩.
        videoState = data.video || null
        if (videoState) {
          const b = videoState.building
          const relevant =
            pid && ((b && b.pid === pid) || (videoState.queue || []).some((v) => v.pid === pid))
          if (relevant) mountVideo()
          const vl = videoState.last
          if (vl && vl.at > lastVideoAt) {
            lastVideoAt = vl.at
            if (vl.ok && vl.pid === pid)
              loadManifest().catch(() => {}) // 클립 완료→_clipStatus 갱신, 릴 완료→플레이어
            else mountVideo()
            const label = vl.kind === 'reel' ? '릴' : vl.kind === 'recover' ? '복구' : '영상 클립'
            setStatus(
              vl.cancelled
                ? `${label} ${vl.pauseKind === 'pause' ? '일시정지' : '중단'}됨: ${vl.pid}`
                : vl.ok
                  ? `${label} 완료: ${vl.pid}${vl.durationSec ? ` (${vl.durationSec.toFixed(1)}초)` : ''}` +
                    (vl.firebaseWarn ? ` · ⚠ ${vl.firebaseWarn}` : '')
                  : `${label} 실패: ${vl.error}`
            )
          }
        }

        const panel = $('#queue-panel')
        // Firebase 미연결이면 큐 패널 숨김 (검토 기능만 사용)
        if (!data.firebaseReady) {
          panel.classList.add('hidden')
          return
        }
        panel.classList.remove('hidden')

        autoOn = data.autoOn
        const tgl = $('#auto-toggle')
        if (data.viewOnly) {
          // 뷰어 모드: 생성은 별도 워커(worker:listen) 담당 — 토글 비활성.
          tgl.textContent = '뷰어 모드'
          tgl.className = 'off'
          tgl.disabled = true
          tgl.title = '생성은 워커 프로세스가 담당합니다 (npm run worker:listen)'
        } else {
          tgl.textContent = autoOn ? '자동생성 ON' : '일시정지됨'
          tgl.className = autoOn ? 'on' : 'off'
          tgl.disabled = false
        }

        const now = $('#queue-now')
        const ci = data.currentInfo
        if (ci) {
          const prog = ci.total ? ` — 장면 ${ci.done}/${ci.total}` : ''
          const watching = ci.personaId && pid === ci.personaId
          now.innerHTML =
            `생성 중 <b>${ci.name || ci.pid}</b>${prog}` +
            (watching ? '' : ci.personaId ? ` <button id="follow-live">실시간 보기</button>` : '') +
            (data.viewOnly ? '' : ` <button id="gen-stop" class="stop-btn">중지</button>`)
          const fl = $('#follow-live')
          if (fl)
            fl.onclick = async () => {
              pid = ci.personaId
              renderPersonaList()
              liveSig = ''
              await loadManifest().catch(() => setStatus('아직 첫 장 생성 전입니다 — 곧 나타납니다.'))
            }
          const gs = $('#gen-stop')
          if (gs)
            gs.onclick = async () => {
              gs.disabled = true
              gs.textContent = '중지 중…'
              try {
                await api('/api/stop', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' })
                setStatus('생성 중지 요청 — 현재 장면까지 마치고 멈춥니다 (진행분은 저장·재개 가능)')
              } catch (e) {
                setStatus(`중지 실패: ${e.message}`)
              }
            }
        } else {
          now.textContent = data.queue.some((q) => q.status === 'submitted') ? '대기 중…' : '유휴'
        }

        // 실시간 보기: 생성 중인 persona를 보고 있으면 새 장이 저장될 때마다 그리드 갱신.
        // manifest는 장마다 즉시 기록되므로(life-library의 중단 대비 writeManifest)
        // 폴링 주기(2초) 안에 새 포트레이트/장면이 바로 떠오른다.
        if (ci?.personaId && pid === ci.personaId) {
          api(`/api/personas/${pid}`)
            .then((m) => {
              const sig = `${m.images.length}`
              if (sig !== liveSig) {
                liveSig = sig
                manifest = m
                render()
              }
            })
            .catch(() => {}) // 생성 극초반엔 manifest가 아직 없다 — 다음 폴링에서 재시도
          // 새 persona가 목록에 아직 없으면 흡수 (검토 중인 선택은 유지)
          if (!personas.some((p) => p.personaId === ci.personaId))
            loadPersonas({ keep: true }).catch(() => {})
        }

        const list = $('#queue-list')
        if (data.queue.length === 0) {
          list.innerHTML = '<span class="qempty">큐가 비어 있습니다.</span>'
        } else {
          list.innerHTML = data.queue
            .map(
              (q) =>
                `<div class="qitem" title="${q.error ? q.error.replaceAll('"', '&quot;') : q.id}">` +
                `<span class="qid">${q.name || q.id}</span>` +
                `<span class="badge ${q.status}">${QLABEL[q.status] || q.status}</span>` +
                (q.status === 'error' && !data.viewOnly
                  ? `<button class="retry-btn" data-id="${q.id}">재실행</button>`
                  : '') +
                // 인생그래프 세션은 자동 생성이 없다 — "대기" 상태에 이 버튼이 유일한 시작 지점.
                (q.kind === 'lifegraph' && q.status === 'submitted' && !data.viewOnly
                  ? `<button class="gen-btn" data-id="${q.id}">생성</button>`
                  : '') +
                `</div>`
            )
            .join('')
        }

        // 새 완료 감지 → 검토 목록만 갱신(선택 유지). 새 persona가 셀렉터에 등장한다.
        if (data.lastResult && data.lastResult.ok && data.lastResult.at > lastCompletionAt) {
          lastCompletionAt = data.lastResult.at
          loadPersonas({ keep: true }).catch(() => {})
        }
      }

      $('#auto-toggle').addEventListener('click', async () => {
        try {
          const r = await api('/api/autogen', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ on: !autoOn })
          })
          autoOn = r.autoOn
          pollQueue()
        } catch (e) {
          setStatus(`자동생성 토글 실패: ${e.message}`)
        }
      })

      loadPersonas().then(loadSession)
      pollQueue()
      setInterval(pollQueue, 2000)
    </script>
  </body>
</html>
