<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>CDB</title>
    <!-- https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP -->
    <!-- 웹앱: 라이브러리 미디어는 서버 동일 오리진 /media/* 로 서빙(과거 zoe: 프로토콜 대체).
         connect-src 'self' = /api/events(SSE)·/api/*(fetch). 프리로드 영상은 blob 없이 직접 src.
         유령 음성(ElevenLabs Conversational AI): WebSocket wss://*.elevenlabs.io + 서명URL REST https://*.elevenlabs.io.
         오디오 파이프라인이 AudioWorklet(blob 워커)·MediaStream을 써서 worker-src/script-src blob:·media-src mediastream: 허용. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' blob: mediastream:; connect-src 'self' https://*.elevenlabs.io wss://*.elevenlabs.io; worker-src 'self' blob:"
    />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #000;
        cursor: none;
      }
      #view {
        display: block;
        width: 100vw;
        height: 100vh;
      }
      /* spinup→reel 전환 섬광(죽기 직전 섬광). 기본 투명, JS가 짧게 번쩍인다. */
      #flash {
        position: fixed;
        inset: 0;
        background: #fff;
        opacity: 0;
        pointer-events: none;
        z-index: 10;
      }
      /* 테스트용 수동 트리거 버튼(측면 아래 = 좌하단). 관람 흐름과 무관, 눈에 안 띄게. */
      #demoBtn {
        position: fixed;
        left: 14px;
        bottom: 14px;
        z-index: 20;
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.25);
        background: rgba(0, 0, 0, 0.35);
        color: rgba(255, 255, 255, 0.55);
        font-size: 13px;
        line-height: 1;
        cursor: pointer;
        opacity: 0.3;
        transition: opacity 0.2s;
      }
      #demoBtn:hover {
        opacity: 1;
      }
    </style>
  </head>

  <body>
    <canvas id="view"></canvas>
    <div id="flash"></div>
    <button id="demoBtn" type="button" title="reel 데모 수동 실행(테스트)">▶</button>
    <script type="module" src="./src/renderer.js"></script>
  </body>
</html>
