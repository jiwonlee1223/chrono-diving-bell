<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>CDB</title>
    <!-- https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP -->
    <!-- 웹앱: 라이브러리 미디어는 서버 동일 오리진 /media/* 로 서빙(과거 zoe: 프로토콜 대체).
         connect-src 'self' = /api/events(SSE)·/api/*(fetch). 프리로드 영상은 blob 없이 직접 src. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' blob:; connect-src 'self'"
    />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #000;
        cursor: none;
      }
      #view {
        display: block;
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>

  <body>
    <canvas id="view"></canvas>
    <script type="module" src="./src/renderer.js"></script>
  </body>
</html>
